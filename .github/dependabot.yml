version: 2
updates:
  # Python dependencies (requirements.txt + requirements-dev.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Kyiv"
    open-pull-requests-limit: 5
    # Supply-chain cooldown: don't propose a release until it has aged on
    # PyPI. Compromised-maintainer publishes are typically caught and yanked
    # within 24–72h; letting versions rest a few days sidesteps the window
    # where a hijacked package looks like a routine bump. (Security updates
    # for known CVEs bypass cooldown — they come through the separate
    # Dependabot security-update flow.)
    cooldown:
      default-days: 5
      semver-major-days: 14
    groups:
      # One PR for routine patch/minor bumps; majors stay separate so a
      # breaking bump (pydantic, httpx, playwright) is reviewed on its own.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"

  # Base image in the Dockerfile (python:3.11-slim-bookworm security patches)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Kyiv"
    # Patch/minor tag updates only. A Python major (3.11 → 3.x) must be a
    # deliberate migration together with the dependency pins and the CI
    # python-version — a green check on a Dockerfile-only bump proves nothing
    # (tests run on the CI matrix version, not in the image).
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
